<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meltix | Report a Bug</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bug_report.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="video-background">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="{{ url_for('static', filename='models/support_video.mp4') }}" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div class="page-fade-in">
        
        <a href="javascript:history.back()" class="back-btn"><span>✦</span> Return</a>

        <div class="support-container-glass">
            <div class="glow-line"></div>
            
            <div class="glass-inner-split">
                
                <div class="glass-left meltix-HUD-interface">
                    <div class="hud-pattern-overlay"></div>
                    <div class="meltix-icon-circle-container">
                        <div class="meltix-icon-circle">
                            <img src="{{ url_for('static', filename='models/__“A_clean_modern_202604040015.jpg') }}" alt="Meltix Icon" id="meltix-icon-img">
                            <div class="icon-inner-glow"></div>
                        </div>
                        <div class="icon-halo-glow"></div>
                    </div>

                    <div class="header-section">
                        <h1 class="dynamic-title" id="dynamicTitle">Report a Bug</h1>
                        <p class="dynamic-subtitle" id="dynamicSubtitle">Help us fix the glitches in the matrix.</p>
                    </div>
                    
                    <div class="decorative-lines-container">
                        <div class="hud-line-pattern"></div>
                    </div>
                </div>

                <div class="glass-right">
                    <div id="form-container">
                        <form id="reportForm" onsubmit="handleFormSubmit(event)">
                            <div class="form-group">
                                <label class="form-label">Your Email</label>
                                <input type="email" id="userEmail" class="premium-input" placeholder="hello@example.com" value="{{ session.get('profile_email', '') }}" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Describe the Issue</label>
                                <textarea id="userMessage" class="premium-input" placeholder="What exactly happened? Where did it break?" required></textarea>
                            </div>

                            <button type="submit" class="submit-btn" id="submitBtn">Submit Bug Report</button>
                        </form>
                    </div>

                    <div id="thank-you-msg" style="display: none; text-align: center; padding: 20px 0; opacity: 0;">
                        <h2 style="font-family: 'Playfair Display', serif; font-size: 2.2rem; color: #f2c98a; margin-bottom: 15px;">Report Received.</h2>
                        <p style="font-family: 'Lato', sans-serif; font-size: 1.1rem; color: #eaddcf; margin-bottom: 30px; line-height: 1.6;">
                            Thanks for being our eyes in the dark.<br>Our team is already on it to restore the perfect glow.
                        </p>
                        <button onclick="goToShop()" class="submit-btn" style="width: auto; padding: 12px 40px;"> OK </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('userEmail').value.trim();
            const message = document.getElementById('userMessage').value.trim();

            btn.classList.add('loading');
            btn.disabled = true;

            try {
                const response = await fetch('/api/bug-report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        message: message,
                        source_page: 'bug-report'
                    })
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.message || 'Bug report failed');
                }

                btn.classList.remove('loading');
                btn.classList.add('success');
                btn.innerText = "SENT ?";

                setTimeout(() => {
                    const formContainer = document.getElementById('form-container');
                    const thanks = document.getElementById('thank-you-msg');
                    const glassRight = document.querySelector('.glass-right');

                    glassRight.style.minHeight = glassRight.offsetHeight + 'px';
                    glassRight.style.position = 'relative';

                    thanks.style.position = 'absolute';
                    thanks.style.top = '50%';
                    thanks.style.left = '50%';
                    thanks.style.transform = 'translate(-50%, -50%)';
                    thanks.style.width = '80%';
                    thanks.style.display = 'block';
                    thanks.style.opacity = '0';

                    formContainer.style.transition = 'opacity 0.6s ease';
                    thanks.style.transition = 'opacity 0.8s ease';

                    formContainer.style.opacity = '0';
                    setTimeout(() => {
                        thanks.style.opacity = '1';
                    }, 100);

                    setTimeout(() => {
                        formContainer.style.display = 'none';
                    }, 600);
                }, 800);
            } catch (error) {
                console.error(error);
                btn.classList.remove('loading');
                btn.disabled = false;
                btn.innerText = "Error. Try Again.";
            }
        }

        function goToShop() {
            window.location.href = '/shop';
        }
    </script>
</body>
</html>
